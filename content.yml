# -----------------------------------------------------------------------------
# ABOUT
# -----------------------------------------------------------------------------
about:
  bio: |
    I am an Assistant Professor of Environmental Studies at Carleton College and an enrolled member of the Winnebago Tribe of Nebraska. My research examines how people, communities, and institutions engage with conservation and natural resource management. I am particularly interested in the social dimensions of conservation, Indigenous environmental stewardship, and community-engaged approaches to addressing environmental challenges.

    Much of my current work has focused on chronic wasting disease (CWD) in the Upper Midwest, where I have worked alongside Tribal Nations, agency partners, and local communities to better understand the impacts of wildlife disease and to develop locally grounded management strategies. My research draws heavily on social science methods and community-based participatory research (CBPR), with an emphasis on building partnerships and conducting research that benefits the communities involved.

    At Carleton, I teach courses on Tribal sovereignty and sustainability, community engagement and qualitative methods, and Indigenous relationships with land and environmental change. Across my research and teaching, I seek to connect conservation science with the experiences, values, and knowledge of the people most affected by environmental decisions.

  education:
    - { degree: "Ph.D., Conservation Sciences", institution: "University of Minnesota, Twin Cities", year: "2025", detail: "Dissertation: Empowering Tribal Communities to Advance Natural Resource Management and Outreach Through Collaborative Approaches" }
    - { degree: "M.S., Conservation Sciences", institution: "University of Minnesota, Twin Cities", year: "2022" }
    - { degree: "B.A., Biology", institution: "Carleton College", year: "2019" }
  positions:
    - { role: "Assistant Professor of Environmental Studies", institution: "Carleton College", years: "2026–present" }
    - { role: "Postdoctoral Fellow of Environmental Studies", institution: "Carleton College", years: "2024–2026" }

# -----------------------------------------------------------------------------
# RESEARCH
# -----------------------------------------------------------------------------
research:
  intro: >
    My work asks how conservation science can be done in genuine partnership with
    communities, and how that partnership produces better science and better
    outcomes for wildlife and people alike.
  areas:
    - title: Chronic wasting disease (CWD)
      description: >
        Disease ecology, surveillance, and management of CWD in deer and elk
        across the upper Midwest, with attention to spatial spread and the
        social dimensions of response.
    - title: Community-based participatory research
      description: >
        Co-designing research questions, methods, and data governance with the
        communities affected, so that findings are trusted and actionable.
    - title: Indigenous engagement in natural resource management
      description: >
        Centering Tribal sovereignty and Indigenous knowledge in conservation
        decision-making, co-management, and wildlife health.
  statement: >
    Across these areas I treat communities as partners and co-authors. Methods
    range from field surveillance and spatial modeling to interviews, workshops,
    and collaborative data-governance agreements.
  publications_note: >
    * denotes student co-author. For the complete and most current list, see my
    Google Scholar profile or CV.

# -----------------------------------------------------------------------------
# TEACHING
# -----------------------------------------------------------------------------
teaching:
  intro: >
    My teaching centers Indigenous environmental stewardship, Tribal
    sovereignty, and community-engaged research. Across my courses, students
    engage with the legal and cultural foundations of Tribal natural resource
    management, learn qualitative and community-based research methods, and
    examine Indigenous relationships with land through Native scholarship and
    critical discussion.
    
  photos:
    - { src: "Class_Prairie.jpg", caption: "Learning about fire ecology and prairie management through a prescribed burn at the Carleton Arboretum." }
    - { src: "Fire_Class.png", caption: "Learning beyond the classroom: students examining local approaches to caring for and sustaining natural environments at Prairie Creek Wildlife Management Area." }
    
  courses:
    - { term: "Fall 2026",   code: "ENTS 220", title: "Sovereignty and Sustainability", description: "Explores the legal, cultural, and environmental foundations of Tribal
        and Indigenous environmental stewardship and natural resource
        management. Students examine the historical significance of treaties,
        Tribal sovereignty, and federal trust responsibility, alongside the key
        laws that have shaped Tribal resource use. Through case studies, the
        course analyzes the evolution of Tribal co-management with federal and
        state agencies, highlighting both challenges and successful
        partnerships. Traditional ecological knowledge (TEK) and Indigenous
        worldviews on land stewardship complement critical discussions of
        climate change, environmental justice, and the balance between economic
        development and ecological sustainability in Tribal resource use." }
    - { term: "Winter 2027", code: "ENTS 180", title: "Community Engagement and Qualitative Methods", description: "Introduces community-engaged research and qualitative methods in
        environmental and social contexts. Students examine principles of
        working with communities, ethical research practices, and the role of
        power, positionality, and cultural humility. Through exercises,
        workshops, and group projects, students learn to collect, code, and
        analyze qualitative data from interviews, focus groups, and
        observations, with an emphasis on reflective practice and translating
        findings into actionable outputs. By term's end, students can plan
        community-based research projects, critically evaluate existing studies,
        and understand the challenges and opportunities of ethical qualitative
        research." }
    - { term: "Spring 2027", code: "ENTS 320", title: "Seminar: Listening to the Land", description: "For many Indigenous peoples, land is a relative, a teacher, and a source
        of knowledge. This seminar examines Indigenous relationships with land
        through the writings of Native authors, scholars, and activists,
        exploring traditional ecological knowledge, stewardship, and
        environmental challenges. We consider how Indigenous knowledge informs
        responses to climate change, land use, and biodiversity loss, while
        recognizing land and non-human beings as active participants in cultural
        and ecological systems. In a reading-group format, discussions foster
        critical reflection and connections to broader environmental issues, and
        students complete an independent research paper applying course themes to
        a focused topic." }
    

