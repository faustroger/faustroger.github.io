teaching:
  intro: >
    I teach across conservation science, environmental justice, and field
    methods, emphasizing hands-on fieldwork and community-engaged projects.
  courses:
    - { term: "Fall 2026",   code: "ENTS 215", title: "Conservation Science",            description: "Principles of conservation biology with regional case studies." }
    - { term: "Winter 2026", code: "ENTS 268", title: "Community-Based Environmental Research", description: "Theory and practice of participatory and Indigenous-led research." }
    - { term: "Spring 2026", code: "ENTS 340", title: "Field Methods in Wildlife Ecology", description: "Survey design, sampling, and disease surveillance in the field." }

