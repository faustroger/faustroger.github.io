# =============================================================================
#  content.yml  —  THE ONLY FILE YOU EDIT
# =============================================================================
#  This single file powers the whole website. To update your site:
#    1. Edit this file (on GitHub: click the pencil icon ✏️).
#    2. Save / commit.
#    3. Your live site updates in ~1 minute. That's it.
#
#  TWO KINDS OF CONTENT:
#    A) PROFILE BLOCKS (about you, slow-changing): profile, about, research,
#       teaching, outreach, fieldnotes, contact. Edit occasionally.
#    B) ENTRIES (your living CV stream): one growing list at the bottom.
#       Every publication, talk, outreach event, and field note is ONE entry.
#       To add something new, copy a template block and fill it in. Done.
#
#  YAML rules that keep you out of trouble:
#    - Indent with 2 SPACES (never tabs).
#    - A list item starts with "- ".
#    - If your text has a colon ":" in it, wrap the whole value in quotes,
#      e.g.  title: "CWD: a regional update"
#    - Long text: use  |  then indent the lines (see bio below).
# =============================================================================

